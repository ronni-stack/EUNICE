<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EUNICE v0.8</title>
<style>
:root { --bg:#0b0b0b; --surface:#141414; --surface-hover:#1f1f1f; --text:#e8e8e8; --text-muted:#777; --accent:#00d4aa; --accent-dim:rgba(0,212,170,0.12); --user-bubble:#252525; --ai-bubble:#001a14; --border:#2a2a2a; --danger:#ff4444; --sidebar-width:280px; }
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; overflow:hidden; }

/* Sidebar */
#sidebar { position:fixed; top:0; left:0; bottom:0; width:var(--sidebar-width); background:var(--surface); border-right:1px solid var(--border); z-index:250; transform:translateX(-100%); transition:transform .3s ease; display:flex; flex-direction:column; }
#sidebar.open { transform:translateX(0); }
#sidebar-header { padding:14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
#sidebar-header h2 { font-size:14px; color:var(--accent); letter-spacing:1px; }
#new-chat-sidebar { padding:10px 14px; border-bottom:1px solid var(--border); }
#new-chat-sidebar button { width:100%; padding:10px; border-radius:10px; border:none; background:var(--accent); color:#000; font-weight:600; font-size:13px; cursor:pointer; }
#new-chat-sidebar button:active { transform:scale(.98); }
#session-list { flex:1; overflow-y:auto; padding:8px; }
.session-item { padding:10px 12px; border-radius:10px; cursor:pointer; margin-bottom:4px; transition:background .15s; display:flex; align-items:center; gap:8px; }
.session-item:hover { background:var(--surface-hover); }
.session-item.active { background:var(--accent-dim); }
.session-item .s-title { font-size:13px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }
.session-item .s-date { font-size:10px; color:var(--text-muted); flex-shrink:0; }
.session-delete { width:20px; height:20px; border-radius:4px; border:none; background:transparent; color:var(--text-muted); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:12px; opacity:0; transition:opacity .2s; }
.session-item:hover .session-delete { opacity:1; }
.session-delete:hover { color:var(--danger); background:rgba(255,68,68,.15); }
#sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:240; }
#sidebar-overlay.active { display:block; }

/* Header */
#header { position:fixed; top:0; left:0; right:0; height:50px; padding:10px 14px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:10px; z-index:100; }
#header-left { display:flex; align-items:center; gap:10px; flex:1; min-width:0; }
#menu-btn { width:34px; height:34px; border-radius:8px; border:none; background:var(--surface-hover); color:var(--text-muted); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
#menu-btn:hover { color:var(--accent); background:var(--accent-dim); }
#menu-btn svg { width:18px; height:18px; }
#header h1 { font-size:17px; font-weight:700; letter-spacing:1.5px; color:var(--accent); white-space:nowrap; }
#header-center { flex:1; min-width:0; text-align:center; }
#current-session-title { font-size:12px; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#status { font-size:11px; color:var(--text-muted); display:flex; align-items:center; gap:6px; flex-shrink:0; }
#status-dot { width:7px; height:7px; border-radius:50%; background:var(--danger); transition:background .3s; }
#status-dot.online { background:var(--accent); box-shadow:0 0 6px var(--accent); }
#version-badge { font-size:10px; color:var(--text-muted); margin-left:4px; }
.icon-btn { width:34px; height:34px; border-radius:8px; border:none; background:var(--surface-hover); color:var(--text-muted); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
.icon-btn:hover { color:var(--accent); background:var(--accent-dim); }
.icon-btn svg { width:18px; height:18px; }

/* Chat */
#chat-wrapper { position:fixed; top:50px; left:0; right:0; bottom:80px; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:10px; }
.message { max-width:86%; padding:10px 13px; border-radius:14px; font-size:15px; line-height:1.45; word-wrap:break-word; flex-shrink:0; }
.message.user { align-self:flex-end; background:var(--user-bubble); border-bottom-right-radius:3px; animation:fadeIn .2s ease; }
.message.ai { align-self:flex-start; background:var(--ai-bubble); border:1px solid #002a20; border-bottom-left-radius:3px; }
.message.ai.new { animation:fadeIn .2s ease; }
.message.ai.streaming { border-color: var(--accent); box-shadow:0 0 0 1px var(--accent-dim); }
.message.ai .label { font-size:10px; color:var(--accent); margin-bottom:3px; font-weight:700; letter-spacing:.5px; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }
#typing { display:none; align-self:flex-start; padding:6px 12px; font-size:12px; color:var(--text-muted); font-style:italic; flex-shrink:0; }

/* Input */
#input-area { position:fixed; bottom:0; left:0; right:0; height:80px; padding:10px 12px; padding-bottom:max(10px, env(safe-area-inset-bottom)); background:var(--surface); border-top:1px solid var(--border); display:flex; gap:8px; align-items:center; z-index:100; }
#msg-input { flex:1; background:var(--bg); border:1px solid var(--border); border-radius:18px; padding:10px 14px; color:var(--text); font-size:16px; outline:none; resize:none; height:44px; max-height:60px; font-family:inherit; line-height:1.4; }
#msg-input:focus { border-color:var(--accent); }
#msg-input:disabled { opacity:.5; cursor:not-allowed; }
.btn { width:44px; height:44px; border-radius:50%; border:none; background:var(--surface-hover); color:var(--text); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .2s; flex-shrink:0; }
.btn:disabled { opacity:.4; cursor:not-allowed; }
.btn:active:not(:disabled) { transform:scale(.92); }
.btn:hover:not(:disabled) { background:var(--accent-dim); color:var(--accent); }
.btn svg { width:20px; height:20px; }
.btn.send { background:var(--accent); color:#000; }
.btn.send:hover:not(:disabled) { background:#00bfa0; }
.btn.pause { background:var(--danger); color:#fff; }
.btn.pause:hover:not(:disabled) { background:#cc3333; }
.btn.recording { background:var(--danger); color:#fff; animation:pulse 1.2s infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,68,68,.35);} 50%{box-shadow:0 0 0 10px rgba(255,68,68,0);} }

/* Modal */
#overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:200; justify-content:center; align-items:center; }
#overlay.active { display:flex; }
#modal { background:var(--surface); border:1px solid var(--border); border-radius:16px; width:92%; max-width:420px; max-height:80vh; overflow-y:auto; padding:18px; }
#modal h2 { font-size:16px; margin-bottom:14px; color:var(--accent); }
.modal-row { margin-bottom:14px; }
.modal-row label { display:block; font-size:12px; color:var(--text-muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:.5px; }
.modal-row textarea, .modal-row select, .modal-row input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:10px; color:var(--text); font-family:inherit; font-size:13px; }
.modal-row textarea { min-height:120px; resize:vertical; }
.toggle-row { display:flex; align-items:center; justify-content:space-between; }
.toggle { width:44px; height:24px; border-radius:12px; background:#333; position:relative; cursor:pointer; transition:background .2s; }
.toggle.on { background:var(--accent); }
.toggle::after { content:""; position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%; background:#fff; transition:left .2s; }
.toggle.on::after { left:22px; }
.modal-btns { display:flex; gap:8px; justify-content:flex-end; margin-top:10px; }
.modal-btns button { padding:8px 16px; border-radius:8px; border:none; font-size:13px; cursor:pointer; }
#save-btn { background:var(--accent); color:#000; font-weight:600; }
#cancel-btn { background:var(--surface-hover); color:var(--text); }

/* Auth Error Toast */
#auth-error { display:none; position:fixed; top:60px; left:50%; transform:translateX(-50%); background:var(--danger); color:#fff; padding:10px 20px; border-radius:8px; font-size:13px; z-index:300; animation:slideDown .3s ease; white-space:nowrap; }
@keyframes slideDown { from{opacity:0;transform:translateX(-50%) translateY(-20px);} to{opacity:1;transform:translateX(-50%) translateY(0);} }
</style>
</head>
<body>

<div id="auth-error">Wrong API key. Check Settings and try again.</div>

<!-- Sidebar -->
<div id="sidebar-overlay"></div>
<div id="sidebar">
  <div id="sidebar-header">
    <h2>CHATS</h2>
    <button class="icon-btn" id="close-sidebar" style="width:28px;height:28px;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div id="new-chat-sidebar">
    <button id="new-chat-btn-sidebar">+ New Chat</button>
  </div>
  <div id="session-list"></div>
</div>

<!-- Header -->
<div id="header">
  <div id="header-left">
    <button class="icon-btn" id="menu-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <h1>EUNICE</h1>
  </div>
  <div id="header-center">
    <div id="current-session-title">New Chat</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <div id="status">
      <span id="status-dot"></span>
      <span id="status-text">Offline</span>
      <span id="version-badge"></span>
    </div>
    <button class="icon-btn" id="settings-btn" title="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.08 15a1.65 1.65 0 0 0-1.51-1H2a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.08 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V2a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
</div>

<!-- Chat -->
<div id="chat-wrapper">
  <div class="message ai new"><div class="label">EUNICE</div>I am online and listening. Speak or type to begin.</div>
</div>
<div id="typing">EUNICE is thinking...</div>

<!-- Input -->
<div id="input-area">
  <button class="btn" id="mic-btn" title="Hold to speak">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
  </button>
  <textarea id="msg-input" rows="1" placeholder="Message EUNICE..."></textarea>
  <button class="btn send" id="send-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</div>

<!-- Settings Modal -->
<div id="overlay">
  <div id="modal">
    <h2>Settings</h2>
    <div class="modal-row">
      <label>API Key</label>
      <input type="password" id="api-key-input" placeholder="Enter your API key..." autocomplete="off">
    </div>
    <div class="modal-row toggle-row">
      <label>Voice Output</label>
      <div class="toggle" id="voice-toggle"></div>
    </div>
    <div class="modal-row">
      <label>Voice Selection</label>
      <select id="voice-select"><option value="">Default (Auto-pick female)</option></select>
    </div>
    <div class="modal-row">
      <label>Speech Rate</label>
      <select id="rate-select">
        <option value="0.8">Slow</option>
        <option value="1.0" selected>Normal</option>
        <option value="1.2">Fast</option>
        <option value="1.4">Very Fast</option>
      </select>
    </div>
    <div class="modal-row">
      <label>System Prompt (Personality)</label>
      <textarea id="personality-box" placeholder="Loading..."></textarea>
    </div>
    <div class="modal-btns">
      <button id="cancel-btn">Close</button>
      <button id="save-btn">Save & Apply</button>
    </div>
  </div>
</div>

<script>
const API_BASE = window.location.origin;
const chatWrapper = document.getElementById('chat-wrapper');
const input = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const micBtn = document.getElementById('mic-btn');
const typing = document.getElementById('typing');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const versionBadge = document.getElementById('version-badge');
const sessionTitle = document.getElementById('current-session-title');
const authError = document.getElementById('auth-error');
const sidebar = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebar-overlay');
const sessionList = document.getElementById('session-list');

let currentSession = null; // Start null, will create new chat on load
let voiceEnabled = false;
let selectedVoice = null;
let speechRate = 1.0;
let voices = [];
let apiKey = localStorage.getItem('eunice_api_key') || '';
let deviceId = localStorage.getItem('eunice_device_id') || '';
if (!deviceId) {
  deviceId = 'dev-' + crypto.randomUUID();
  localStorage.setItem('eunice_device_id', deviceId);
}
let isStreaming = false;
let currentReader = null;
let currentAiDiv = null;

// Track which sessions are processing (for polling when returning)
const processingSessions = new Set();

function getHeaders() {
  const h = { 'Content-Type': 'application/json' };
  if (apiKey) h['Authorization'] = 'Bearer ' + apiKey;
  if (deviceId) h['X-EUNICE-Device-ID'] = deviceId;
  return h;
}

function showAuthError(msg) {
  authError.textContent = msg || 'Wrong API key. Check Settings and try again.';
  authError.style.display = 'block';
  setTimeout(() => { authError.style.display = 'none'; }, 4000);
}

// ─── Button State ───
const SEND_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';
const PAUSE_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';

function setStreamingState(streaming) {
  isStreaming = streaming;
  if (streaming) {
    sendBtn.innerHTML = PAUSE_ICON;
    sendBtn.classList.remove('send');
    sendBtn.classList.add('pause');
    sendBtn.disabled = false;
    sendBtn.style.opacity = '1';
  } else {
    sendBtn.innerHTML = SEND_ICON;
    sendBtn.classList.remove('pause');
    sendBtn.classList.add('send');
    sendBtn.disabled = false;
    sendBtn.style.opacity = '1';
    currentReader = null;
    currentAiDiv = null;
  }
}

// ─── Sidebar ───
function openSidebar() {
  sidebar.classList.add('open');
  sidebarOverlay.classList.add('active');
  loadSessions();
}
function closeSidebar() {
  sidebar.classList.remove('open');
  sidebarOverlay.classList.remove('active');
}

document.getElementById('menu-btn').addEventListener('click', openSidebar);
document.getElementById('close-sidebar').addEventListener('click', closeSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);

async function loadSessions() {
  try {
    const resp = await fetch(API_BASE + '/sessions', { headers: getHeaders() });
    if (!resp.ok) return;
    const data = await resp.json();
    sessionList.innerHTML = '';
    if (!data.sessions || data.sessions.length === 0) {
      sessionList.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:12px;">No chats yet</div>';
      return;
    }
    data.sessions.forEach(s => {
      const div = document.createElement('div');
      div.className = 'session-item';
      if (s.id === currentSession) div.classList.add('active');
      const dateStr = s.last_active ? new Date(s.last_active).toLocaleDateString() : '';
      // Show processing indicator if this session is still working
      const processing = processingSessions.has(s.id) ? ' ●' : '';
      div.innerHTML = `
        <span class="s-title">${escapeHtml(s.title || s.id)}${processing}</span>
        <span class="s-date">${dateStr}</span>
        <button class="session-delete" title="Delete chat">×</button>
      `;
      div.querySelector('.session-delete').onclick = (e) => {
        e.stopPropagation();
        deleteSession(s.id);
      };
      div.onclick = () => switchSession(s.id, s.title);
      sessionList.appendChild(div);
    });
  } catch(e) {}
}

async function deleteSession(sessionId) {
  if (!confirm('Delete this chat?')) return;
  try {
    await fetch(API_BASE + '/sessions/' + encodeURIComponent(sessionId), {
      method: 'DELETE',
      headers: getHeaders()
    });
    processingSessions.delete(sessionId);
    if (sessionId === currentSession) {
      createNewChat();
    } else {
      loadSessions();
    }
  } catch(e) {}
}

async function switchSession(sessionId, title) {
  // Cancel current stream if any
  if (currentReader) {
    currentReader.cancel();
    currentReader = null;
  }
  if (currentAiDiv) {
    currentAiDiv.classList.remove('streaming');
  }
  setStreamingState(false);

  currentSession = sessionId;
  sessionTitle.textContent = title || sessionId;
  localStorage.setItem('eunice_last_session', sessionId);
  localStorage.setItem('eunice_last_session_title', title || sessionId);
  chatWrapper.innerHTML = '';

  // Load history
  await loadSessionHistory(sessionId);
  closeSidebar();
}

async function loadSessionHistory(sessionId) {
  try {
    const resp = await fetch(API_BASE + '/history/' + encodeURIComponent(sessionId), { headers: getHeaders() });
    if (resp.ok) {
      const data = await resp.json();
      if (data.messages && data.messages.length > 0) {
        data.messages.forEach(m => {
          appendMessage(m.content, m.role === 'user' ? 'user' : 'ai', false);
        });

        // Check if last message is from user — EUNICE might still be processing
        const lastMsg = data.messages[data.messages.length - 1];
        if (lastMsg.role === 'user') {
          // Start polling for completion
          showTyping();
          pollForResponse(sessionId);
        }
      } else {
        appendMessage("New chat started. I still remember everything about you.", "ai", false);
      }
    } else {
      appendMessage("New chat started. I still remember everything about you.", "ai", false);
    }
  } catch(e) {
    appendMessage("New chat started. I still remember everything about you.", "ai", false);
  }
}

function showTyping() {
  typing.style.display = 'block';
  chatWrapper.scrollTop = chatWrapper.scrollHeight;
}

function hideTyping() {
  typing.style.display = 'none';
}

async function pollForResponse(sessionId) {
  // Poll every 2 seconds until assistant responds
  const maxAttempts = 60; // 2 minutes max
  let attempts = 0;

  const poll = async () => {
    if (sessionId !== currentSession) return; // User switched away
    attempts++;

    try {
      const resp = await fetch(API_BASE + '/history/' + encodeURIComponent(sessionId), { headers: getHeaders() });
      if (!resp.ok) return;
      const data = await resp.json();

      if (data.messages && data.messages.length > 0) {
        const lastMsg = data.messages[data.messages.length - 1];

        if (lastMsg.role === 'assistant') {
          // Response arrived! Clear and re-render
          hideTyping();
          processingSessions.delete(sessionId);
          chatWrapper.innerHTML = '';
          data.messages.forEach(m => {
            appendMessage(m.content, m.role === 'user' ? 'user' : 'ai', false);
          });
          return;
        }
      }

      if (attempts < maxAttempts) {
        setTimeout(poll, 2000);
      } else {
        hideTyping();
        processingSessions.delete(sessionId);
        appendMessage("[Response timed out. Try again.]", "ai", false);
      }
    } catch(e) {
      if (attempts < maxAttempts) {
        setTimeout(poll, 2000);
      }
    }
  };

  processingSessions.add(sessionId);
  poll();
}

function createNewChat() {
  if (currentReader) {
    currentReader.cancel();
    currentReader = null;
  }
  if (currentAiDiv) {
    currentAiDiv.classList.remove('streaming');
  }
  setStreamingState(false);

  const ts = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
  const newId = 'chat-' + ts;
  currentSession = newId;
  sessionTitle.textContent = 'New Chat';
  localStorage.setItem('eunice_last_session', currentSession);
  localStorage.setItem('eunice_last_session_title', 'New Chat');
  chatWrapper.innerHTML = '';
  appendMessage("New chat started. I still remember everything about you.", "ai", false);
  closeSidebar();
}

document.getElementById('new-chat-btn-sidebar').addEventListener('click', createNewChat);

// ─── Voice ───
function loadVoices() {
  voices = window.speechSynthesis.getVoices();
  const select = document.getElementById('voice-select');
  select.innerHTML = '<option value="">Default (Auto-pick female)</option>';
  voices.forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = v.name + (v.lang ? ' (' + v.lang + ')' : '');
    select.appendChild(opt);
  });
  if (!selectedVoice) {
    const female = voices.findIndex(v => /female|samantha|victoria|karen|zira|laura|sarah/i.test(v.name));
    if (female >= 0) { select.value = female; selectedVoice = voices[female]; }
  }
}
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
}

function speak(text) {
  if (!voiceEnabled || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const chunks = text.match(/[^.!?]+[.!?]+|[^.!?]+$/g) || [text];
  let i = 0;
  function next() {
    if (i >= chunks.length) return;
    const u = new SpeechSynthesisUtterance(chunks[i].trim());
    u.rate = speechRate;
    u.pitch = 1.05;
    if (selectedVoice) u.voice = selectedVoice;
    u.onend = () => { i++; next(); };
    window.speechSynthesis.speak(u);
  }
  next();
}

// ─── Messages ───
function appendMessage(text, sender, animate = true) {
  const div = document.createElement('div');
  div.className = 'message ' + sender;
  if (animate && sender === 'ai') div.classList.add('new');
  if (sender === 'ai') {
    div.innerHTML = '<div class="label">EUNICE</div><span class="content">' + escapeHtml(text) + '</span>';
  } else {
    div.textContent = text;
  }
  chatWrapper.appendChild(div);
  chatWrapper.scrollTop = chatWrapper.scrollHeight;
  return div;
}

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML.replace(/\n/g, '<br>');
}

// ─── Pause Stream ───
function pauseStream() {
  if (currentReader) {
    currentReader.cancel();
    currentReader = null;
  }
  if (currentAiDiv) {
    currentAiDiv.classList.remove('streaming');
    const contentSpan = currentAiDiv.querySelector('.content');
    if (contentSpan) {
      contentSpan.innerHTML += '<br><em style="color:var(--text-muted);font-size:12px;">[Paused by user]</em>';
    }
  }
  processingSessions.delete(currentSession);
  setStreamingState(false);
}

// ─── Streaming Chat ───
async function sendMessage() {
  const text = input.value.trim();
  if (!text || isStreaming) return;
  input.value = '';
  input.rows = 1;
  appendMessage(text, 'user');
  showTyping();
  setStreamingState(true);

  try {
    const resp = await fetch(API_BASE + '/chat/stream', {
      method: 'POST',
      headers: getHeaders(),
      body: JSON.stringify({ message: text, session: currentSession, device_id: deviceId })
    });

    if (resp.status === 401) {
      hideTyping();
      showAuthError('Wrong API key. Check Settings and try again.');
      setStreamingState(false);
      return;
    }

    if (!resp.ok) {
      hideTyping();
      appendMessage("[Server error. Check EUNICE logs.]", 'ai');
      setStreamingState(false);
      return;
    }

    hideTyping();
    currentAiDiv = appendMessage("", 'ai');
    currentAiDiv.classList.add('streaming');
    const contentSpan = currentAiDiv.querySelector('.content');
    let fullText = "";

    currentReader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await currentReader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const jsonStr = line.slice(6).trim();
        if (!jsonStr) continue;
        try {
          const data = JSON.parse(jsonStr);
          if (data.error) {
            contentSpan.innerHTML = escapeHtml("[Error: " + data.error + "]");
            currentAiDiv.classList.remove('streaming');
            processingSessions.delete(currentSession);
            setStreamingState(false);
            return;
          }
          if (data.token) {
            fullText += data.token;
            contentSpan.innerHTML = escapeHtml(fullText);
            chatWrapper.scrollTop = chatWrapper.scrollHeight;
          }
          if (data.done) {
            currentAiDiv.classList.remove('streaming');
            processingSessions.delete(currentSession);
            setStreamingState(false);
            speak(fullText);
            return;
          }
        } catch (e) {}
      }
    }
    currentAiDiv.classList.remove('streaming');
    processingSessions.delete(currentSession);
    setStreamingState(false);
    speak(fullText);

  } catch (err) {
    hideTyping();
    appendMessage("[Connection lost. Is EUNICE's server running?]", 'ai');
    processingSessions.delete(currentSession);
    setStreamingState(false);
  }
}

sendBtn.addEventListener('click', () => {
  if (isStreaming) {
    pauseStream();
  } else {
    sendMessage();
  }
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
input.addEventListener('input', () => {
  input.rows = Math.min(5, Math.max(1, input.value.split('\n').length));
});

// ─── Mic ───
let recognition = null;
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-US';
  recognition.onresult = e => {
    const transcript = e.results[0][0].transcript;
    micBtn.classList.remove('recording');
    input.value = transcript;
    appendMessage(transcript, 'user');
    input.value = '';
    input.rows = 1;
    sendMessage();
  };
  recognition.onerror = () => micBtn.classList.remove('recording');
  recognition.onend = () => micBtn.classList.remove('recording');
} else { micBtn.style.display = 'none'; }

micBtn.addEventListener('mousedown', () => { if(recognition && !isStreaming){ micBtn.classList.add('recording'); recognition.start(); }});
micBtn.addEventListener('mouseup', () => { if(recognition){ recognition.stop(); }});

// ─── Settings ───
const overlay = document.getElementById('overlay');
const voiceToggle = document.getElementById('voice-toggle');
const voiceSelect = document.getElementById('voice-select');
const rateSelect = document.getElementById('rate-select');
const personalityBox = document.getElementById('personality-box');
const apiKeyInput = document.getElementById('api-key-input');

voiceToggle.addEventListener('click', () => {
  voiceToggle.classList.toggle('on');
  voiceEnabled = voiceToggle.classList.contains('on');
});
voiceSelect.addEventListener('change', () => {
  selectedVoice = voices[parseInt(voiceSelect.value)] || null;
});
rateSelect.addEventListener('change', () => {
  speechRate = parseFloat(rateSelect.value);
});

document.getElementById('settings-btn').addEventListener('click', async () => {
  overlay.classList.add('active');
  apiKeyInput.value = apiKey;
  if (voiceEnabled) voiceToggle.classList.add('on');
  else voiceToggle.classList.remove('on');
  try {
    const resp = await fetch(API_BASE + '/personality', { headers: getHeaders() });
    if (resp.ok) {
      const data = await resp.json();
      personalityBox.value = data.personality;
    } else if (resp.status === 401) {
      personalityBox.value = "[Authentication failed — check API key]";
      showAuthError('Wrong API key. Check Settings and try again.');
    } else {
      personalityBox.value = "[Could not load personality]";
    }
  } catch(e) { personalityBox.value = "[Could not connect to server]"; }
});

document.getElementById('cancel-btn').addEventListener('click', () => overlay.classList.remove('active'));

document.getElementById('save-btn').addEventListener('click', async () => {
  apiKey = apiKeyInput.value.trim();
  localStorage.setItem('eunice_api_key', apiKey);
  try {
    const resp = await fetch(API_BASE + '/personality', {
      method: 'POST',
      headers: getHeaders(),
      body: JSON.stringify({ personality: personalityBox.value })
    });
    if (resp.ok) {
      overlay.classList.remove('active');
      appendMessage("[Settings saved. Personality updated.]", "ai", false);
    } else if (resp.status === 401) {
      showAuthError('Wrong API key. Check Settings and try again.');
    } else {
      alert("Failed to save settings.");
    }
  } catch(e) { alert("Failed to save settings. Server unreachable."); }
});

overlay.addEventListener('click', e => { if(e.target === overlay) overlay.classList.remove('active'); });

// ─── Health Check ───
async function checkHealth() {
  try {
    const resp = await fetch(API_BASE + '/health', { method: 'GET' });
    if (resp.ok) {
      const data = await resp.json();
      statusDot.classList.add('online');
      statusText.textContent = 'Online';
      if (data.version) versionBadge.textContent = 'v' + data.version;
    } else throw new Error();
  } catch {
    statusDot.classList.remove('online');
    statusText.textContent = 'Offline';
    versionBadge.textContent = '';
  }
}
checkHealth();
setInterval(checkHealth, 5000);

// ─── Initialize: Restore last session or create new ───
const lastSession = localStorage.getItem('eunice_last_session');
const lastSessionTitle = localStorage.getItem('eunice_last_session_title');

if (lastSession) {
    currentSession = lastSession;
    sessionTitle.textContent = lastSessionTitle || 'Previous Chat';
    loadSessionHistory(currentSession);
} else {
    createNewChat();
}
</script>
